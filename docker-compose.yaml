services:
  moha_duka_api:
    build: .
    container_name: moha_duka_backend
    environment:
      MODULE_NAME: main
      VARIABLE_NAME: app
      APP_NAME: Moha Duka API
      BASE_URL: http://localhost:8000
      DATABASE_URL: postgresql://postgres:moha_duka_password@moha_postgres:5432/moha_duka
      SECRET_KEY: replace-with-a-long-random-string
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_MINUTES: 30
      REFRESH_TOKEN_DAYS: 7
      CORS_ORIGINS: http://localhost:5500,http://127.0.0.1:5500,http://localhost:8080,http://127.0.0.1:8080
      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: lax
    ports:
      - "8000:80"
    depends_on:
      moha_postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - moha_duka_net

  vue_app:
    image: nginx:alpine
    container_name: moha_duka_frontend
    volumes:
      - ../vue.js:/usr/share/nginx/html:ro
    ports:
      - "8080:80"
    depends_on:
      - moha_duka_api
    restart: unless-stopped
    networks:
      - moha_duka_net

  moha_postgres:
    image: postgres:latest
    container_name: moha_duka_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: moha_duka_password
      POSTGRES_DB: moha_duka
    ports:
      - "5142:5432"
    volumes:
      - moha_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d moha_duka"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - moha_duka_net

volumes:
  moha_postgres_data:

networks:
  moha_duka_net:
    driver: bridge
